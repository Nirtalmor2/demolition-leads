# טריגר חיצוני יומי ל-ingest (חלופה ל-Vercel Cron, לכל אירוח).
# מגדירים שני Secrets ב-repo: INGEST_URL (כתובת הדיפלוי) ו-CRON_SECRET (אם הוגדר).
name: daily-ingest

on:
  schedule:
    - cron: "0 3 * * *" # 03:00 UTC יומי
  workflow_dispatch: {} # הרצה ידנית מה-UI

jobs:
  ingest:
    runs-on: ubuntu-latest
    env:
      INGEST_URL: ${{ secrets.INGEST_URL || 'https://nirobnzpoc.vercel.app' }}
      CRON_SECRET: ${{ secrets.CRON_SECRET || '' }}
    steps:
      - name: Trigger ingest endpoint
        run: |
          auth_args=()
          if [ -n "$CRON_SECRET" ]; then
            auth_args=(-H "Authorization: Bearer $CRON_SECRET")
          fi

          curl -sS -X GET "$INGEST_URL/api/cron/ingest" "${auth_args[@]}" \
            --max-time 290 --fail-with-body
